<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Robottino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #2c3e50;">

    <div style="background: white; padding: 50px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 700px; width: 90%;">
        <h1 style="color: #2c3e50; margin-top: 0; font-size: 3rem;">🤖 Robottino Coding</h1>
        <p style="color: #7f8c8d; font-size: 1.3rem; margin-bottom: 40px; font-weight: bold;">Scegli come vuoi accedere alla piattaforma:</p>
        
        <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;">
            
            <a href="gioco.html" style="text-decoration: none; flex: 1; min-width: 250px;">
                <div class="hub-card player-card">
                    <div style="font-size: 5rem; margin-bottom: 15px;">🎮</div>
                    <h2 style="margin: 0; color: white; font-size: 2rem;">GIOCATORE</h2>
                    <p style="color: #ecf0f1; margin-top: 10px; font-size: 1.1rem;">Avvia la missione e risolvi i livelli</p>
                </div>
            </a>
            
            <a href="editor.html" style="text-decoration: none; flex: 1; min-width: 250px;">
                <div class="hub-card creator-card">
                    <div style="font-size: 5rem; margin-bottom: 15px;">🛠️</div>
                    <h2 style="margin: 0; color: white; font-size: 2rem;">LEVEL CREATOR</h2>
                    <p style="color: #ecf0f1; margin-top: 10px; font-size: 1.1rem;">Costruisci e salva nuove sfide</p>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
