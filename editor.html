<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Livelli - Robottino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main id="editor-main">
        <section id="grid-section">
            <div id="grid-container"></div>
        </section>

        <aside id="control-panel">
            <h2>Strumenti</h2>
            <div id="tools">
                <button class="tool-btn" data-tool="robot" title="Robottino">🤖</button>
                <button class="tool-btn" data-tool="wall" title="Muro">🧱</button>
                <button class="tool-btn" data-tool="ball" title="Pallina">🔴</button>
                <button class="tool-btn" data-tool="deposit" title="Deposito">📥</button>
                <button class="tool-btn" data-tool="flag" title="Bandierina">🏁</button>
                <button class="tool-btn" data-tool="eraser" title="Gomma">🧹</button>
		<button class="tool-btn" data-tool="key" title="Chiave">🔑</button>
		<button class="tool-btn" data-tool="lock" title="Serratura">🔒</button>
		<button class="tool-btn" data-tool="gate" title="Cancello">🚪</button>
            </div>

            <h2>Sottomenu Opzioni</h2>
            <div id="submenu" class="hidden">
                <p class="placeholder-text">Seleziona uno strumento</p>
            </div>

            <h2>Dati Livello</h2>
            <div id="level-info">
                <input type="text" id="level-title" placeholder="Titolo del livello">
                <textarea id="level-instructions" placeholder="Scrivi qui le istruzioni per la missione..."></textarea>
                <input type="number" id="level-timer" placeholder="Secondi a disposizione (opzionale)" min="0">
            </div>
<h2>Sequenza Comandi</h2>
            <div id="command-builder">
                <div class="command-controls">
                    <select id="command-selector">
                        <option value="avanti">Avanti</option>
                        <option value="indietro">Indietro</option>
                        <option value="sinistra">Ruota a Sinistra</option>
                        <option value="raccogli">Raccogli</option>
                        <option value="lascia">Lascia</option>
                        <option value="ripeti">Ripeti X volte</option>
                        <option value="fine_ripeti">Fine Ripetizione</option>
                    </select>
                    <button id="btn-add-command">Aggiungi</button>
                </div>
                <div id="sequence-list">
                    <p class="placeholder-text">Nessun comando inserito.</p>
                </div>
                <button id="btn-clear-sequence" style="margin-top: 10px; font-size: 0.9rem; padding: 8px;">Svuota Sequenza</button>
            </div>

            <h2>Azioni</h2>
            <div id="actions">
                <button id="btn-save">Salva Livello</button>
                <button id="btn-load">Carica Livello</button>
                <button id="btn-test" class="btn-primary">Prova Livello</button>
            </div>
        </aside>
    </main>

    <div id="test-overlay" class="hidden">
        <div id="game-container">
            
            <div id="mission-header" style="width: 100%; text-align: center; margin-bottom: 15px;">
                <h2 id="display-mission-title" style="margin: 0; color: #2c3e50; font-size: 1.5rem;"></h2>
                <p id="display-mission-text" style="font-size: 1.1rem; background: #e8f8f5; padding: 10px 20px; border-radius: 8px; border: 2px solid #1abc9c; display: inline-block; max-width: 80%; margin: 10px 0; font-weight: bold;"></p>
                <div id="display-timer" style="font-size: 1.2rem; font-weight: bold; color: #e74c3c;"></div>
            </div>
            
            <div id="game-layout" style="display: flex; gap: 30px; width: 100%; align-items: flex-start;">
                
                <div id="game-board-area" style="flex: 1.5; display: flex; justify-content: center;">
                    <div id="game-board-container">
                        <div id="game-grid" class="game-grid"></div>
                    </div>
                </div>
                
                <div id="game-ui-area" style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
		<div style="background: #fdf2e9; padding: 15px; border-radius: 8px; border: 2px solid #e67e22; flex-shrink: 0; margin-bottom: 15px;">
    <h3 style="margin: 0 0 10px 0; font-size: 1.1rem; color: #d35400;">Inventario</h3>
    <div id="student-inventory" style="display: flex; justify-content: center; align-items: center; height: 60px; background: #fff; border: 2px dashed #f39c12; border-radius: 8px; font-size: 2.5rem;">
    </div>
</div>
                    
                    <div style="background: #ecf0f1; padding: 15px; border-radius: 8px;">
                        <h3 style="margin-top: 0; font-size: 1.1rem;">Comandi</h3>
                        <div id="student-palette" style="display: flex; flex-wrap: wrap; gap: 8px;">
                            <button class="student-cmd-btn" data-cmd="avanti">Avanti</button>
                            <button class="student-cmd-btn" data-cmd="indietro">Indietro</button>
                            <button class="student-cmd-btn" data-cmd="sinistra">Ruota a Sinistra</button>
                            <button class="student-cmd-btn" data-cmd="raccogli">Raccogli</button>
                            <button class="student-cmd-btn" data-cmd="lascia">Lascia</button>
                            <button class="student-cmd-btn btn-loop" data-cmd="ripeti">Ripeti</button>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; flex: 1;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
    <h3 style="margin: 0; font-size: 1.1rem;">Il Tuo Codice</h3>
    <button id="btn-clear-student-code" style="padding: 5px 10px; font-size: 0.9rem; background: #fadbd8; color: #c0392b; border: 1px solid #e74c3c; border-radius: 4px; cursor: pointer; font-weight: bold;">🗑️ Svuota Tutto</button>
</div>
                        <div id="student-sequence-area" style="background: #fff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 4px; min-height: 250px;">
                            <p class="placeholder-text" id="student-placeholder">Clicca sui comandi per iniziare a scrivere.</p>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button id="btn-play" class="btn-primary" style="flex: 1;">▶️ Avvia</button>
                        <button id="btn-stop" style="flex: 1; background: #e74c3c; color: white;">⏹️ Ferma</button>
                        <button id="btn-reset" style="flex: 1; background: #f39c12; color: white;">🔄 Ripristina</button>
                    </div>

                </div>
            </div>
            
            <button id="btn-close-test" style="margin-top: 20px;">Chiudi e Torna all'Editor</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
